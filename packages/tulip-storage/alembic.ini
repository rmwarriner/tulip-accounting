# Alembic configuration for tulip-storage.
#
# Run migrations from the repo root:
#   uv run alembic -c packages/tulip-storage/alembic.ini upgrade head
#
# The DB URL is overridden at runtime via the TULIP_DATABASE_URL env var
# (see env.py). The placeholder below is only used when none is supplied.

[alembic]
script_location = src/tulip_storage/migrations
sqlalchemy.url = sqlite:///:memory:
prepend_sys_path = .
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC

# Truncate slug after this many chars
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
