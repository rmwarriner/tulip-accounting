[project]
name = "tulip-importers"
version = "0.0.0"
description = "File-format importers (OFX, QIF, CSV, journal) for Tulip Accounting."
requires-python = ">=3.12"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tulip_importers"]
