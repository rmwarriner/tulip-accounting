<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}Report{% endblock %} · Tulip Accounting</title>
<style>
{# Toner-friendly print stylesheet per ARCHITECTURE.md §8.
   These rules apply on screen AND in PDF; the @media print block
   below tightens a few values for paper output. #}

* { box-sizing: border-box; }

body {
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI",
               Helvetica, Arial, sans-serif;
  font-size: 11pt;
  line-height: 1.4;
  color: #000;
  background: #fff;
  margin: 1.5em 2em;
  max-width: 8.5in;
}

h1, h2, h3, h4 {
  font-weight: 700;
  color: #000;
  margin-top: 1.2em;
  margin-bottom: 0.4em;
}

h1 { font-size: 1.6em; margin-top: 0; border-bottom: 1.5pt solid #000; padding-bottom: 0.2em; }
h2 { font-size: 1.25em; }
h3 { font-size: 1.05em; }

p { margin: 0.4em 0; }

table {
  border-collapse: collapse;
  width: 100%;
  margin: 0.8em 0;
}

table caption {
  caption-side: top;
  text-align: left;
  font-weight: 700;
  margin-bottom: 0.3em;
}

th, td {
  padding: 0.3em 0.6em;
  text-align: left;
  vertical-align: top;
  border-bottom: 0.5pt solid #000;
}

th {
  border-bottom: 1pt solid #000;
  font-weight: 700;
}

.num, td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }

{# Color reserved for emphasis only (negative balances + warnings). #}
.negative { color: #b00020; }
.warning  { color: #b56b00; }

.meta { color: #555; font-size: 0.9em; margin-bottom: 1em; }
.meta dt { display: inline; font-weight: 700; margin-right: 0.3em; }
.meta dd { display: inline; margin-right: 1em; }
.meta dd:after { content: ""; display: block; height: 0; }

.totals { font-weight: 700; }
.totals td { border-top: 1pt solid #000; border-bottom: 1.5pt double #000; }

.empty {
  font-style: italic;
  color: #555;
  padding: 0.4em 0.6em;
  border: 0.5pt dashed #555;
  background: transparent;
}

footer {
  margin-top: 2em;
  padding-top: 0.4em;
  border-top: 0.5pt solid #000;
  font-size: 0.85em;
  color: #555;
}

@media print {
  body { margin: 0.5in; }
  h1 { page-break-before: avoid; }
  table { page-break-inside: avoid; }
  tr { page-break-inside: avoid; }
  thead { display: table-header-group; }
  tfoot { display: table-footer-group; }
}
</style>
</head>
<body>
<header>
<h1>{% block report_title %}{{ self.title() }}{% endblock %}</h1>
{% block meta %}{% endblock %}
</header>

<main>
{% block content %}{% endblock %}
</main>

<footer>
{% block footer %}
Generated by Tulip Accounting · {{ generated_at | isodate if generated_at else "" }}
{% endblock %}
</footer>
</body>
</html>
