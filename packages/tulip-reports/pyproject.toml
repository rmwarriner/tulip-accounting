[project]
name = "tulip-reports"
version = "0.0.0"
description = "Report generators (toner-friendly PDF/HTML/CSV) for Tulip Accounting."
requires-python = ">=3.12"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tulip_reports"]
