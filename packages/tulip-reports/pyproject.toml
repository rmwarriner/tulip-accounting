[project]
name = "tulip-reports"
version = "0.0.0"
description = "Report generators (toner-friendly PDF/HTML/CSV) for Tulip Accounting."
requires-python = ">=3.12"
dependencies = [
    "tulip-core",
    "tulip-storage",
    "tulip-ai",
    "jinja2>=3.1",
]

[tool.uv.sources]
tulip-core = { workspace = true }
tulip-storage = { workspace = true }
tulip-ai = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tulip_reports"]

[tool.hatch.build.targets.wheel.force-include]
"src/tulip_reports/templates" = "tulip_reports/templates"
