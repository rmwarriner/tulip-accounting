[project]
name = "tulip-ai"
version = "0.0.0"
description = "AI capability adapters + redactor + audit writer for Tulip Accounting (Phase 6, ADR-0005)."
requires-python = ">=3.12"
dependencies = [
    "tulip-core",
    "tulip-storage",
    "litellm>=1.83.10",
    "pydantic>=2.7",
    # sqlglot parses + validates the model-emitted SQL on the NL-query
    # capability (P6.2). We reject anything that isn't a single SELECT
    # touching only ``ai_view_*`` table names, then rewrite each
    # ``ai_view_*`` reference to a tenant-scoped subquery before execution.
    "sqlglot>=27",
]

[tool.uv.sources]
tulip-core = { workspace = true }
tulip-storage = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tulip_ai"]
