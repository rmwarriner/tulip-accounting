[project]
name = "tulip-cli"
version = "0.0.0"
description = "Command-line client (Typer) for the Tulip Accounting API."
requires-python = ">=3.12"
dependencies = [
    "typer>=0.12",
    "httpx>=0.27",
    "rich>=13.7",
]

[project.scripts]
tulip = "tulip_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tulip_cli"]
