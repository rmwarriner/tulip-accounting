# CodeQL — semantic code analysis for security vulnerabilities
#
# Free for public repositories. Results appear in the "Security" tab and as
# inline annotations on PRs.
#
# RECOMMENDATION: Try GitHub's "default setup" first.
#
#   1. GitHub repo → Settings → Code security → Code scanning
#   2. Click "Set up" → "Default"
#   3. Done.
#
# Default setup works well for pure-Python projects, requires no workflow file,
# and is auto-maintained by GitHub. If it produces what you want, delete this
# workflow file and you're done.
#
# This advanced workflow exists if you ever want explicit control over query
# suites, scheduling, or analysis paths. To switch to advanced setup, you must
# first disable default setup in the repo settings.
#
# The CodeQL Action v4 is current; v3 is deprecated in December 2026.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Skip docs-only / tooling-only PRs — CodeQL has no Python to analyze
    # there, and the analyze step is ~1–2 min per run. The `push` trigger
    # above still runs CodeQL unconditionally on every merge to main, so
    # nothing slips through if a future docs PR accidentally touches code.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'justfile'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/labeler.yml'
  schedule:
    # Weekly Monday 06:30 UTC. Cron must exist on the default branch to fire.
    - cron: "30 6 * * 1"

permissions:
  security-events: write   # required to upload SARIF results
  contents: read           # required to checkout code
  actions: read            # required for private repos (no-op on public)

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-extended adds higher-recall queries; security-and-quality
          # also flags maintainability issues. Start with security-extended;
          # widen later if signal-to-noise stays good.
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          category: "/language:${{ matrix.language }}"
