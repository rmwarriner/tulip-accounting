# Tulip Accounting — Continuous Integration
#
# This workflow runs on every push to main and every pull request. It enforces
# the discipline described in README.md and docs/ARCHITECTURE.md §7.3:
#
#   - Code is formatted and lint-clean (ruff)
#   - Code passes strict static type checking (mypy --strict)
#   - All tests pass with at least 85% line coverage
#   - No secrets accidentally committed (gitleaks)
#
# Jobs run in parallel; the `all-checks-passed` gate at the end is what branch
# protection should require, so adding a new job doesn't require updating the
# branch-protection rule.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR — saves CI minutes when pushing rapid fixes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "latest"

jobs:

  # ---------------------------------------------------------------------------
  # Path-filter — compute which job groups need to run for this PR.
  #
  # The expensive jobs (test, benchmarks, dependency-audit, type-check) gate
  # on these outputs so docs- and tooling-only PRs don't pay full CI runtime.
  # `lint` and `secrets-scan` always run because they're cheap and catch
  # regressions in any file (markdown links, accidentally-committed secrets).
  #
  # The conditional only applies on `pull_request`; on `push` to `main`
  # (post-merge) the downstream jobs always run as a final verification gate.
  # See #92 for the rationale.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      deps: ${{ steps.filter.outputs.deps }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - 'packages/**/*.py'
              - 'packages/**/*.ini'   # alembic.ini etc.
              - 'pyproject.toml'
              - 'uv.lock'
            deps:
              - 'pyproject.toml'
              - 'uv.lock'
            ci:
              - '.github/workflows/**'

  # ---------------------------------------------------------------------------
  # Lint & format check (ruff replaces flake8/isort/black with a single fast tool)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install workspace dependencies
        run: uv sync --all-packages --dev

      - name: ruff check (lint)
        run: uv run ruff check

      - name: ruff format --check (no autoformatting allowed in CI)
        run: uv run ruff format --check

  # ---------------------------------------------------------------------------
  # Strict static type checking
  # ---------------------------------------------------------------------------
  type-check:
    name: Type check (mypy --strict)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install workspace dependencies
        run: uv sync --all-packages --dev

      - name: mypy
        run: uv run mypy

  # ---------------------------------------------------------------------------
  # Unit + property-based tests with coverage gate
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest + coverage)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache apt packages (SQLCipher)
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: apt-sqlcipher-${{ runner.os }}-v1

      - name: Install SQLCipher headers
        # tulip-storage links against SQLCipher; required for storage tests.
        # On the macOS/Windows side, contributors install locally; CI is Linux-only.
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev sqlcipher

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install workspace dependencies
        run: uv sync --all-packages --dev

      - name: Run tests with coverage
        # --cov-fail-under enforces the project floor declared in README.md.
        # Bump this number as coverage improves; never lower it without an ADR.
        # `-n auto --maxprocesses=4` parallelises test execution across CPU
        # cores via pytest-xdist while capping at 4 workers so local
        # invocations don't saturate developer machines (CI runners are
        # 4-vCPU so the cap is a no-op here; it matters locally). The cap
        # mirrors XDIST_WORKERS in the justfile.
        run: |
          uv run pytest -n auto --maxprocesses 4 \
            --cov \
            --cov-report=term \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=85 \
            --junitxml=junit.xml

      - name: Upload coverage XML (for downstream tools)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload coverage HTML report
        # HTML report is for human inspection on `main` post-merge; PR runs
        # don't need to upload it (saves ~10-20s and a few MB per PR run).
        if: always() && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: warn

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit
          path: junit.xml
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Secrets scanning — catches API keys, credentials, etc. accidentally committed
  # ---------------------------------------------------------------------------
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # gitleaks scans full history on PRs

      # Run gitleaks directly rather than via gitleaks-action@v2: that action
      # fails on initial commits because it tries to diff <root-commit>^..HEAD
      # (the parent of the root commit doesn't exist). The official Docker
      # image is the upstream-recommended invocation and works on any history.
      - name: gitleaks
        uses: docker://zricethezav/gitleaks:latest
        with:
          args: detect --source=/github/workspace --redact --verbose --no-banner

  # ---------------------------------------------------------------------------
  # Dependency audit — fails the build if any non-editable installed package
  # has a known CVE in the PyPA Advisory Database. Editable workspace packages
  # (tulip-*) are skipped because they aren't on PyPI.
  # ---------------------------------------------------------------------------
  dependency-audit:
    name: Dependency audit (pip-audit)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.deps == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install workspace dependencies
        run: uv sync --all-packages --dev

      - name: Run pip-audit
        # Add `--ignore-vuln GHSA-xxxx-xxxx-xxxx` entries below ONLY with a
        # comment explaining why the advisory is not exploitable in our usage.
        # Each entry should reference an issue tracking the upstream fix.
        run: |
          IGNORES=()
          # IGNORES+=(--ignore-vuln GHSA-xxxx-xxxx-xxxx)  # reason + tracking issue
          uv run pip-audit --skip-editable "${IGNORES[@]}"

  # ---------------------------------------------------------------------------
  # Performance benchmarks — wall-clock budgets on hot ledger paths. Sequential
  # (pytest-benchmark is incompatible with xdist). The benchmark suite is
  # excluded from the default test loop via the `not benchmark` marker filter
  # in `pyproject.toml [tool.pytest.ini_options].addopts`, so this is the only
  # job that exercises it.
  # ---------------------------------------------------------------------------
  benchmarks:
    name: Performance benchmarks
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache apt packages (SQLCipher)
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: apt-sqlcipher-${{ runner.os }}-v1

      - name: Install SQLCipher headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev sqlcipher

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install workspace dependencies
        run: uv sync --all-packages --dev

      - name: Run benchmarks
        run: |
          uv run pytest -m benchmark --benchmark-only \
            --benchmark-json=benchmark-results.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmark-results.json
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Single gate to require in branch protection — adding new jobs above does
  # not require updating the branch protection rule, only this `needs:` list.
  # ---------------------------------------------------------------------------
  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [changes, lint, type-check, test, secrets-scan, dependency-audit, benchmarks]
    if: always()
    steps:
      - name: Verify all required jobs succeeded or were correctly skipped
        # Conditional jobs (test, benchmarks, etc.) report `skipped` when
        # their path filter says they didn't need to run. That's a pass.
        # Only `failure` / `cancelled` should fail this gate.
        run: |
          fail=0
          # `changes` itself must succeed — if its outputs are missing the
          # gated jobs below would skip silently regardless of intent.
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "::error::changes job reported '${{ needs.changes.result }}'"
            fail=1
          fi
          for r in \
              "${{ needs.lint.result }}" \
              "${{ needs.type-check.result }}" \
              "${{ needs.test.result }}" \
              "${{ needs.secrets-scan.result }}" \
              "${{ needs.dependency-audit.result }}" \
              "${{ needs.benchmarks.result }}"; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::Required check reported '$r'"; fail=1 ;;
            esac
          done
          [ "$fail" -eq 0 ] || exit 1
          echo "All required checks passed (or were correctly skipped)."

# -----------------------------------------------------------------------------
# Future additions (track via ADR before adding):
#
#   - schemathesis: API contract tests against the live OpenAPI spec.
#     Add when tulip-api lands (Phase 2).
#
#   - architecture tests: verify module-boundary rules (tulip-core has no I/O
#     imports, tulip-cli does not import tulip-storage, etc.). Add when the
#     boundary surface is large enough to need automated enforcement (Phase 1+).
#
#   - container image build & scan: when the Dockerfile lands in Phase 8.
# -----------------------------------------------------------------------------
