# Tulip Accounting — Continuous Integration
#
# This workflow runs on every push to main and every pull request. It enforces
# the discipline described in README.md and docs/ARCHITECTURE.md §7.3:
#
#   - Code is formatted and lint-clean (ruff)
#   - Code passes strict static type checking (mypy --strict)
#   - All tests pass with at least 85% line coverage
#   - No secrets accidentally committed (gitleaks)
#
# Jobs run in parallel; the `all-checks-passed` gate at the end is what branch
# protection should require, so adding a new job doesn't require updating the
# branch-protection rule.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR — saves CI minutes when pushing rapid fixes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  # Pinned per security audit L-19. Bump explicitly + verify locally
  # first; "latest" has silently changed CI behaviour before. Matches
  # the Homebrew-installed uv at the time of bumping.
  UV_VERSION: "0.11.11"

jobs:

  # ---------------------------------------------------------------------------
  # Path-filter — compute which job groups need to run for this PR.
  #
  # The expensive jobs (test, benchmarks, dependency-audit, type-check) gate
  # on these outputs so docs- and tooling-only PRs don't pay full CI runtime.
  # `lint` and `secrets-scan` always run because they're cheap and catch
  # regressions in any file (markdown links, accidentally-committed secrets).
  #
  # The conditional only applies on `pull_request`; on `push` to `main`
  # (post-merge) the downstream jobs always run as a final verification gate.
  # See #92 for the rationale.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      deps: ${{ steps.filter.outputs.deps }}
      ci: ${{ steps.filter.outputs.ci }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            python:
              - 'packages/**/*.py'
              - 'packages/**/*.ini'   # alembic.ini etc.
              - 'pyproject.toml'
              - 'uv.lock'
            deps:
              - 'pyproject.toml'
              - 'uv.lock'
            ci:
              - '.github/workflows/**'
            docker:
              - 'deploy/docker/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'packages/**/pyproject.toml'

  # ---------------------------------------------------------------------------
  # Lint & format check (ruff replaces flake8/isort/black with a single fast tool)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install workspace dependencies
        run: uv sync --all-packages --dev

      - name: ruff check (lint)
        run: uv run ruff check

      - name: ruff format --check (no autoformatting allowed in CI)
        run: uv run ruff format --check

  # ---------------------------------------------------------------------------
  # Strict static type checking
  # ---------------------------------------------------------------------------
  type-check:
    name: Type check (mypy --strict)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install workspace dependencies
        run: uv sync --all-packages --dev

      - name: mypy
        run: uv run mypy

  # ---------------------------------------------------------------------------
  # Unit + property-based tests (matrix shard per workspace package).
  #
  # Per ADR-0006, sharding the test job by package cuts wall-clock from the
  # ~14 minutes a single-job run took at Phase 6 close down to the slowest
  # individual shard (~2-3 min). Each shard produces a partial `.coverage`
  # data file; the `coverage` job below combines them and enforces the
  # 85% floor on the aggregate.
  #
  # Matrix values are controlled (declared inline below); no untrusted input
  # is interpolated into `run:` commands, so the matrix expansion is safe.
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.package }})
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel sibling shards if one fails — easier to triage a real
      # regression vs. an unrelated flake on a different shard.
      fail-fast: false
      matrix:
        package:
          - tulip-core
          - tulip-storage
          - tulip-api
          - tulip-cli
          - tulip-tui
          - tulip-ai
          - tulip-importers
          # tulip-reports has 0 tests today; exclude rather than run a
          # no-tests-collected job that would exit 5.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache apt packages (SQLCipher)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /var/cache/apt/archives
          key: apt-sqlcipher-${{ runner.os }}-v1

      - name: Install SQLCipher headers + weasyprint runtime libs
        # tulip-storage links against SQLCipher; required for storage tests.
        # tulip-reports' weasyprint dep (P7.2) needs Pango + HarfBuzz +
        # fontconfig at runtime (weasyprint 60+ ships its own PDF renderer
        # in pure Python but still uses Pango for text shaping).
        # On macOS/Windows, contributors install locally; CI is Linux-only.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              libsqlcipher-dev sqlcipher \
              libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libfontconfig1

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install workspace dependencies
        run: uv sync --all-packages --dev

      - name: Run tests with coverage (${{ matrix.package }})
        # `COVERAGE_FILE` keeps each shard's partial data isolated under a
        # unique name so the aggregate job can combine all shards.
        # `--cov-fail-under=0` overrides the global 85% floor in
        # `[tool.coverage.report]` so each shard doesn't fail when only its
        # own package's code is exercised — the floor is meaningful only on
        # the combined data, enforced by the `coverage` job below.
        # `-n auto --maxprocesses=4` mirrors the justfile.
        env:
          COVERAGE_FILE: .coverage.${{ matrix.package }}
          PACKAGE: ${{ matrix.package }}
        run: |
          uv run pytest -n auto --maxprocesses 4 \
            "packages/${PACKAGE}/tests" \
            --cov \
            --cov-report= \
            --cov-fail-under=0 \
            --junitxml="junit-${PACKAGE}.xml"

      - name: Upload partial coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-partial-${{ matrix.package }}
          path: .coverage.${{ matrix.package }}
          include-hidden-files: true
          if-no-files-found: error

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: junit-${{ matrix.package }}
          path: junit-${{ matrix.package }}.xml
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Coverage aggregation — combines all matrix shards, enforces the 85% gate.
  # Runs only after every test shard has reported (success or failure); if
  # any shard failed, this job still runs to provide a coverage signal but
  # the aggregate `all-checks-passed` gate fails via `test`'s status.
  # ---------------------------------------------------------------------------
  coverage:
    name: Aggregate coverage (combine + 85% gate)
    needs: [changes, test]
    if: |
      always() &&
      (github.event_name == 'push' || needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install workspace dependencies
        # Coverage needs the package layout resolvable to map data files
        # back to source paths during `coverage combine`.
        run: uv sync --all-packages --dev

      - name: Download all partial coverage artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: coverage-partial-*
          path: .coverage-partials
          merge-multiple: true

      - name: Combine and report
        # 85% project floor declared in README.md. Bump as coverage
        # improves; never lower it without an ADR.
        run: |
          cp .coverage-partials/.coverage.* . 2>/dev/null || (echo "::error::no partial coverage files found"; exit 1)
          uv run coverage combine .coverage.*
          uv run coverage report --fail-under=85
          uv run coverage xml
          uv run coverage html

      - name: Upload combined coverage XML
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Upload combined coverage HTML
        # HTML report is for human inspection on `main` post-merge; PR runs
        # don't need to upload it (saves ~10-20s and a few MB per PR run).
        if: always() && github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-html
          path: htmlcov/
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Secrets scanning — catches API keys, credentials, etc. accidentally committed
  # ---------------------------------------------------------------------------
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # gitleaks scans full history on PRs

      # Run gitleaks directly rather than via gitleaks-action@v2: that action
      # fails on initial commits because it tries to diff <root-commit>^..HEAD
      # (the parent of the root commit doesn't exist). The official Docker
      # image is the upstream-recommended invocation and works on any history.
      # Pinned to match `.pre-commit-config.yaml`; bump both together (#228).
      # Older v8.22.1 fails with "dubious ownership" on newer runner images
      # (workspace owned by runner uid, container runs as root) — current
      # v8.30+ trusts the workspace by default.
      - name: gitleaks
        uses: docker://zricethezav/gitleaks:v8.30.1
        with:
          args: detect --source=/github/workspace --redact --verbose --no-banner

  # ---------------------------------------------------------------------------
  # Dependency audit — fails the build if any non-editable installed package
  # has a known CVE in the PyPA Advisory Database. Editable workspace packages
  # (tulip-*) are skipped because they aren't on PyPI.
  # ---------------------------------------------------------------------------
  dependency-audit:
    name: Dependency audit (pip-audit)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.deps == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install workspace dependencies
        run: uv sync --all-packages --dev

      - name: Run pip-audit
        # Add `--ignore-vuln GHSA-xxxx-xxxx-xxxx` entries below ONLY with a
        # comment explaining why the advisory is not exploitable in our usage.
        # Each entry should reference an issue tracking the upstream fix.
        run: |
          IGNORES=()
          # IGNORES+=(--ignore-vuln GHSA-xxxx-xxxx-xxxx)  # reason + tracking issue
          uv run pip-audit --skip-editable "${IGNORES[@]}"

  # ---------------------------------------------------------------------------
  # Performance benchmarks — wall-clock budgets on hot ledger paths. Sequential
  # (pytest-benchmark is incompatible with xdist). The benchmark suite is
  # excluded from the default test loop via the `not benchmark` marker filter
  # in `pyproject.toml [tool.pytest.ini_options].addopts`, so this is the only
  # job that exercises it.
  # ---------------------------------------------------------------------------
  benchmarks:
    name: Performance benchmarks
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache apt packages (SQLCipher)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /var/cache/apt/archives
          key: apt-sqlcipher-${{ runner.os }}-v1

      - name: Install SQLCipher headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev sqlcipher

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install workspace dependencies
        run: uv sync --all-packages --dev

      - name: Run benchmarks
        run: |
          uv run pytest -m benchmark --benchmark-only \
            --benchmark-json=benchmark-results.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-results
          path: benchmark-results.json
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Docker image build + compose smoke (#134).
  #
  # Builds the runtime image from deploy/docker/Dockerfile, generates
  # ephemeral secrets, boots the compose stack with --wait so the
  # healthcheck has to pass, hits /health one more time as a sanity check,
  # then tears down. Skips on PRs that don't touch the Docker bits.
  # ---------------------------------------------------------------------------
  docker-image:
    name: Build & smoke Docker image
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.docker == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate ephemeral secrets
        run: |
          mkdir -p deploy/docker/secrets
          python3 -c 'import base64, secrets; print(base64.b64encode(secrets.token_bytes(32)).decode())' \
            > deploy/docker/secrets/master-key
          python3 -c 'import secrets; print(secrets.token_urlsafe(48))' \
            > deploy/docker/secrets/jwt-secret
          chmod 0400 deploy/docker/secrets/*

      - name: Build image + boot stack
        run: |
          docker compose -f deploy/docker/compose.yml up --build --wait --wait-timeout 120

      - name: Container logs (always, for diagnostics)
        if: always()
        run: |
          docker compose -f deploy/docker/compose.yml logs --no-color --tail 200 api || true

      - name: Verify /health responds
        run: |
          curl --fail --silent --retry 3 --retry-delay 2 \
            http://127.0.0.1:8000/health \
            | tee /tmp/health.txt
          grep -q '"ok"' /tmp/health.txt

      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker/compose.yml down -v --remove-orphans

  # ---------------------------------------------------------------------------
  # Single gate to require in branch protection — adding new jobs above does
  # not require updating the branch protection rule, only this `needs:` list.
  # ---------------------------------------------------------------------------
  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [changes, lint, type-check, test, coverage, secrets-scan, dependency-audit, benchmarks, docker-image]
    if: always()
    steps:
      - name: Verify all required jobs succeeded or were correctly skipped
        # Conditional jobs (test, benchmarks, etc.) report `skipped` when
        # their path filter says they didn't need to run. That's a pass.
        # Only `failure` / `cancelled` should fail this gate.
        #
        # `needs.test.result` for a matrix job is `success` only when every
        # shard succeeded; one failing shard fails the aggregate. `coverage`
        # gates the 85% floor on the combined data.
        run: |
          fail=0
          # `changes` itself must succeed — if its outputs are missing the
          # gated jobs below would skip silently regardless of intent.
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "::error::changes job reported '${{ needs.changes.result }}'"
            fail=1
          fi
          for r in \
              "${{ needs.lint.result }}" \
              "${{ needs.type-check.result }}" \
              "${{ needs.test.result }}" \
              "${{ needs.coverage.result }}" \
              "${{ needs.secrets-scan.result }}" \
              "${{ needs.dependency-audit.result }}" \
              "${{ needs.benchmarks.result }}" \
              "${{ needs.docker-image.result }}"; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::Required check reported '$r'"; fail=1 ;;
            esac
          done
          [ "$fail" -eq 0 ] || exit 1
          echo "All required checks passed (or were correctly skipped)."

# -----------------------------------------------------------------------------
# Future additions (track via ADR before adding):
#
#   - schemathesis: API contract tests against the live OpenAPI spec.
#     Add when tulip-api lands (Phase 2).
#
#   - architecture tests: verify module-boundary rules (tulip-core has no I/O
#     imports, tulip-cli does not import tulip-storage, etc.). Add when the
#     boundary surface is large enough to need automated enforcement (Phase 1+).
#
#   - container image build & scan: when the Dockerfile lands in Phase 8.
# -----------------------------------------------------------------------------
